name: Daily Run

on:
  schedule:
    # Runs every day at noon CST
    - cron: '0 18 * * *'

jobs:
  run-main:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Microsoft ODBC Driver 18
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https

          curl https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/microsoft.gpg > /dev/null

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] \
          https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
          | sudo tee /etc/apt/sources.list.d/microsoft-prod.list

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main.py
        run: python main.py
        env:
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_ENCRYPT: ${{ secrets.AZURE_SQL_ENCRYPT }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          AZURE_SQL_SCHEMA: ${{ secrets.AZURE_SQL_SCHEMA }}
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_TIMEOUT: ${{ secrets.AZURE_SQL_TIMEOUT }}
          AZURE_SQL_TRUST_SERVER_CERTIFICATE: ${{ secrets.AZURE_SQL_TRUST_SERVER_CERTIFICATE }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
